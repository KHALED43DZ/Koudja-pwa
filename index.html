// ─── Constants ────────────────────────────────────────────────────────

const SQUAD_COLORS = {

};
const SQUAD_NAMES = { A: "الفصيلة A", B: "الفصيلة B", C: "الفصيلة C" };
// A=14/03, B=15/03, C=16/03
const REFERENCE_DATE = new Date(2026, 2, 14);

function getSquadForDate(date) {
  const ref = new Date(REFERENCE_DATE); ref.setHours(0,0,0,0);
  const tgt = new Date(date);            tgt.setHours(0,0,0,0);
  const diff = Math.floor((tgt - ref) / 86400000);
  const pos  = ((diff % 3) + 3) % 3;
  if (pos === 0) return "A";
  if (pos === 1) return "B";
  return "C";
}

// أقرب يوم عمل للفصيلة (اليوم أو أمس أو قبل أمس)
function getNearestDutyDate(sq) {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i <= 2; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    if (getSquadForDate(d) === sq) return d;
  }
  return today;
}

function formatDate(date) {
  const days   = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const months = ["يناير","فبراير","مارس","أبريل","مايو","يونيو",
                  "يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

// ─── Smart Distribution Algorithm ────────────────────────────────────
function buildDistribution(vehicles, sqPersonnel, dateMs, vehicleCounts, vehicleStatus) {
  // rotate every 3 days (one duty cycle)
  const dayIndex = Math.floor(dateMs / 86400000);
  const cycle = Math.floor(dayIndex / 3); // changes every 3 days
  const rotate = (arr, n) => {
    if (!arr.length) return [];
    const s = ((n % arr.length) + arr.length) % arr.length;
    return [...arr.slice(s), ...arr.slice(0, s)];
  };

  const byRank = r => sqPersonnel.filter(p => p.rank === r);
  const drivers_light = rotate(byRank("سائق وزن خفيف"), cycle);
  const drivers_heavy = rotate(byRank("سائق وزن ثقيل"), cycle + 7);
  const agents        = rotate(byRank("عون"),   cycle + 11);
  const officers      = rotate(byRank("ضابط"),  cycle + 2);

  // الرقيب اليومي — يُحجز أولاً قبل بناء أي pool
  const allSgts = [...byRank("رقيب"), ...byRank("مساعد")];
  const dailySergeant = allSgts.length
    ? rotate(allSgts, cycle + 5)[(cycle + 1) % allSgts.length]
    : null;
  const dailySgtId = dailySergeant?.id;

  // Sergeants for trucks — يستثني الرقيب اليومي
  const sergeantsForTrucks = rotate(
    allSgts.filter(p => p.id !== dailySgtId), cycle + 5
  );

  // عرفاء: يُقسَّمون بين الإسعاف والشاحنات
  // نحسب احتياج الشاحنات أولاً لنحجز عرفاءها
  const activeTrucks   = vehicles.filter(v => v.type === "تدخل" && vehicleStatus[v.id] !== false);
  const truckCorporalsNeeded = activeTrucks.reduce((sum,v) => sum + ((vehicleCounts[v.id]||{}).corporals ?? 1), 0);
  const allCorporals   = rotate(byRank("عريف"), cycle + 3);
  // عرفاء الشاحنات محجوزون أولاً
  const corpForTrucks  = allCorporals.slice(0, truckCorporalsNeeded);
  const corpForAmbulance = allCorporals.slice(truckCorporalsNeeded);

  const amb03 = vehicles.find(v => v.type === "إسعاف" && v.name.includes("03"));

  const usedTruckCorp = new Set(corpForTrucks.map(p => p.id));

  const used = new Set();
  const pick  = (pool) => { const p = pool.find(x => !used.has(x.id)); if (p) used.add(p.id); return p || null; };
  const pickN = (pool, n) => Array.from({length:n}, () => pick(pool)).filter(Boolean);

  const vlVehicles      = vehicles.filter(v => v.type === "VL");
  const amb03Vehicles   = amb03 ? vehicles.filter(v => v.id === amb03.id) : [];
  const otherAmbulances = vehicles.filter(v => v.type === "إسعاف" && v.id !== amb03?.id);
  const trucks          = activeTrucks.sort((a,b) => a.name.localeCompare(b.name, 'ar'));
  const orderedVehicles = [...vlVehicles, ...amb03Vehicles, ...otherAmbulances, ...trucks];

  const sergeantsCount = sergeantsForTrucks.length;
  const officerNeededForTruck1  = trucks.length > 0 && sergeantsCount < trucks.length;
  const dailySgtNeededForTruck  = officerNeededForTruck1 && sergeantsCount + 1 < trucks.length;

  let officerUsedForTruck  = false;
  let dailySgtUsedForTruck = false;

  const dist = {};
  orderedVehicles.forEach(v => {
    if (vehicleStatus[v.id] === false) {
      dist[v.id] = { driver: null, chief: null, crew: [] };
      return;
    }
    const cfg = vehicleCounts[v.id] || {};
    if (v.type === "VL") {
      dist[v.id] = { driver: pick(drivers_light) || pick(drivers_heavy), crew: [] };
    } else if (v.type === "إسعاف") {
      const driver = pick(drivers_light) || pick(drivers_heavy);
      dist[v.id] = {
        driver,
        chief: pick(corpForAmbulance), // عرفاء الإسعاف فقط
        crew:  pickN([...agents], cfg.agents ?? 1),
      };
    } else if (v.type === "تدخل") {
      const corp = pickN([...corpForTrucks], cfg.corporals ?? 1); // عرفاء الشاحنات المحجوزون
      const ag   = pickN([...agents],        cfg.agents    ?? 1);

      let chief;
      const truckIndex = trucks.indexOf(v);

      if (officerNeededForTruck1 && truckIndex === 0 && !officerUsedForTruck) {
        // الشاحنة 01: يُعيَّن الضابط مباشرة
        const officer = officers[0];
        if (officer) { chief = officer; officerUsedForTruck = true; }
        else chief = pick(sergeantsForTrucks);
      } else if (dailySgtNeededForTruck && officerUsedForTruck && !dailySgtUsedForTruck && truckIndex > 0) {
        // الشاحنة التالية: يُعيَّن الرقيب اليومي (بجانب مهامه)
        if (dailySergeant) { chief = dailySergeant; dailySgtUsedForTruck = true; }
        else chief = pick(sergeantsForTrucks);
      } else {
        chief = pick(sergeantsForTrucks);
      }

      dist[v.id] = {
        driver: pick(drivers_heavy) || pick(drivers_light),
        chief:  chief || null,
        crew:   [...corp, ...ag],
      };
    }
  });
  return dist;
}
// ─── Auto Guard Assignment ────────────────────────────────────────────
function buildGuardAssignment(periods, sqPersonnel, cycle, distribution, vehicles) {
  const rotate = (arr, n) => {
    if (!arr.length) return [];
    const s = ((n % arr.length) + arr.length) % arr.length;
    return [...arr.slice(s), ...arr.slice(0, s)];
  };

  // Pass all present agents rotated by cycle
  const agents = rotate(sqPersonnel.filter(p => p.rank === "عون"), cycle + 17);
  const allCorporals = rotate(sqPersonnel.filter(p => p.rank === "عريف"), cycle + 19);

  // Find عريف in إسعاف 01 — these are LAST for guard duty
  const amb01 = vehicles ? vehicles.find(v => v.type === "إسعاف" && (v.name === "إسعاف 01" || v.name.endsWith("01"))) : null;
  const amb01Ids = new Set();
  if (amb01 && distribution?.[amb01.id]) {
    const d = distribution[amb01.id];
    if (d.chief && sqPersonnel.find(p => p.id === d.chief.id && p.rank === "عريف")) amb01Ids.add(d.chief.id);
    (d.crew || []).forEach(p => { if (sqPersonnel.find(x => x.id === p.id && x.rank === "عريف")) amb01Ids.add(p.id); });
  }

  // Corporal priority: non-إسعاف01 first, then إسعاف01 last
  const corporals = [
    ...allCorporals.filter(p => !amb01Ids.has(p.id)),
    ...allCorporals.filter(p =>  amb01Ids.has(p.id)),
  ];

  const usedGuard = new Set();
  const pick = (pool) => {
    const p = pool.find(x => !usedGuard.has(x.id));
    if (p) usedGuard.add(p.id);
    return p || null;
  };

  // result[i] = { id1, id2 } where id2 only filled if period.count===2
  const result = new Array(periods.length).fill(null).map(() => ({ id1:null, id2:null }));

  // Pass 1: agents fill periods (middle first, keep idx 0 & 5 for corporals)
  // For count=2 periods, assign 2 agents
  [1,2,3,4,0,5].forEach(idx => {
    const p1 = pick(agents);
    if (p1) result[idx].id1 = p1.id;
    if (periods[idx]?.count === 2) {
      const p2 = pick(agents) || pick(corporals);
      if (p2) result[idx].id2 = p2.id;
    }
  });

  // Pass 2: corporals fill remaining empty id1 slots
  [0,5,1,2,3,4].forEach(idx => {
    if (result[idx].id1 === null) {
      const p = pick(corporals);
      if (p) result[idx].id1 = p.id;
    }
  });

  return result; // array of {id1, id2}
}

  return `shift_${squad}_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}
function saveShift(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}
function loadShift(key) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

  const [vType, setVType] = useState("VL");
  const [guardOffice, setGuardOffice] = useState({ officer:"", sergeant:"" });
  const [editGuardOffice, setEditGuardOffice] = useState(false);
  const [showAddVehicle, setShowAddVehicle] = useState(false);
  const [confirmDeleteVehicle, setConfirmDeleteVehicle] = useState(null);
  const [showAddPerson, setShowAddPerson] = useState(false);
  const [editingPerson, setEditingPerson] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [vehicleCounts,  setVehicleCounts]  = useState({});
  const [distribution,   setDistribution]   = useState(null);
  const [attendance,     setAttendance]     = useState({});
  const [vehicleStatus,  setVehicleStatus]  = useState({});
  const currentShiftKey = useRef("");
  const [shiftNote,       setShiftNote]      = useState("");
  const [editVehicleId,   setEditVehicleId]  = useState(null);
  const [editVehicleName, setEditVehicleName]= useState("");

  useEffect(() => {
    if (!manualSquad) setAutoSquad(getSquadForDate(date));
  }, [date, manualSquad]);

  const isSwitchingShift = useRef(false);

  useEffect(() => {
    const sq  = manualSquad || getSquadForDate(date);
    const key = shiftKey(date, sq);
    if (key === currentShiftKey.current) return;

    // Save previous shift explicitly before switching
    if (currentShiftKey.current) {
      saveShift(currentShiftKey.current, {
        attendance: attendanceRef.current,
        vehicleStatus: vehicleStatusRef.current,
        vehicleCounts: vehicleCountsRef.current,
        shiftNote: shiftNoteRef.current,
        guardIds:   guardsRef.current.map(g => g.guardId),
        guardIds2:  guardsRef.current.map(g => g.guardId2),
        guardCounts:guardsRef.current.map(g => g.count),
      });
    }

    isSwitchingShift.current = true;
    const saved = loadShift(key);
    if (saved) {
      setAttendance(saved.attendance    || {});
      setVehicleStatus(saved.vehicleStatus || {});
      setVehicleCounts(saved.vehicleCounts || {});
      setShiftNote(saved.shiftNote || "");
      if (saved.guardIds) {
        setGuards(prev => prev.map((g, i) => ({
          ...g,
          guardId:  saved.guardIds?.[i]  ?? null,
          guardId2: saved.guardIds2?.[i] ?? null,
          count:    saved.guardCounts?.[i] ?? 1,
        })));
      }
    } else {
      setAttendance({});
      setVehicleStatus({});
      setVehicleCounts({});
      setShiftNote("");
    }
    currentShiftKey.current = key;
    setTimeout(() => { isSwitchingShift.current = false; }, 50);
  }, [date, manualSquad]);

  // Refs to always have latest values for save-on-switch
  const attendanceRef     = useRef(attendance);
  const vehicleStatusRef  = useRef(vehicleStatus);
  const vehicleCountsRef  = useRef(vehicleCounts);
  const shiftNoteRef      = useRef(shiftNote);
  const guardsRef         = useRef(guards);
  useEffect(() => { attendanceRef.current    = attendance;    }, [attendance]);
  useEffect(() => { vehicleStatusRef.current = vehicleStatus; }, [vehicleStatus]);
  useEffect(() => { vehicleCountsRef.current = vehicleCounts; }, [vehicleCounts]);
  useEffect(() => { shiftNoteRef.current     = shiftNote;     }, [shiftNote]);
  useEffect(() => { guardsRef.current        = guards;        }, [guards]);

  // Auto-save on any change
  useEffect(() => {
    if (!currentShiftKey.current || isSwitchingShift.current) return;
    saveShift(currentShiftKey.current, { attendance, vehicleStatus, vehicleCounts, shiftNote, guardIds: guards.map(g=>g.guardId), guardIds2: guards.map(g=>g.guardId2), guardCounts: guards.map(g=>g.count) });
  }, [attendance, vehicleStatus, vehicleCounts, shiftNote, guards]);

  // Rebuild distribution when anything relevant changes
  useEffect(() => {
    const sq  = manualSquad || getSquadForDate(date);
    const sqP = (personnel[sq] || []).filter(p => attendance[p.id] !== false);
    const vd2 = new Date(date); vd2.setHours(0,0,0,0);
    const dayIndex = Math.floor(vd2.getTime() / 86400000);
    const cycle    = Math.floor(dayIndex / 3);

    const dist = buildDistribution(vehicles, sqP, vd2.getTime(), vehicleCounts, vehicleStatus);
    setDistribution(dist);

    const guardPairs = buildGuardAssignment(guards, sqP, cycle, dist, vehicles);
    setGuards(prev => prev.map((g, i) => ({
      ...g,
      guardId:  guardPairs[i]?.id1 ?? null,
      guardId2: guardPairs[i]?.id2 ?? null,
    })));
  }, [date, manualSquad, personnel, vehicles, vehicleCounts, attendance, vehicleStatus]);

  const squad       = manualSquad || autoSquad;
  const sc          = SQUAD_COLORS[squad];
  const sqPersonnel = personnel[squad] || [];

  const today = new Date(); today.setHours(0,0,0,0);
  const vd    = new Date(date); vd.setHours(0,0,0,0);
  const isToday = vd.getTime() === today.getTime();

  const goNext = () => {
    const nextD = new Date(date); nextD.setDate(nextD.getDate() + 3);
    // الحد: الوردية القادمة للفصيلة بعد اليوم
    const todayNorm = new Date(); todayNorm.setHours(0,0,0,0);
    let futureLimit = null;
    for (let i = 1; i <= 6; i++) {
      const d = new Date(todayNorm); d.setDate(todayNorm.getDate() + i);
      if (getSquadForDate(d) === squad) { futureLimit = d; break; }
    }
    if (!futureLimit || nextD <= futureLimit) setDate(nextD);
  };

  const goPrev = () => {
    const nearest = getNearestDutyDate(squad);
    const minDate = new Date(nearest); minDate.setDate(nearest.getDate() - 10 * 3);
    const prevD = new Date(date); prevD.setDate(prevD.getDate() - 3);
    if (prevD >= minDate) setDate(prevD);
  };

  const getName  = id => {
    for (const s of SQUADS) {
      const p = personnel[s].find(x => x.id===id);
      if (p) return p.name;
    }
    return null;
  };
  const getPersonByIdPresent = id => {
    for (const s of SQUADS) {
      const p = personnel[s].find(x => x.id===id);
      if (p && isPresent(p.id)) return p;
    }
    return null;
  };

  const getPrevGuardIds = () => {
    const sq = manualSquad || getSquadForDate(date);
    const prevDate = new Date(date); prevDate.setDate(prevDate.getDate() - 3);
    const saved = loadShift(shiftKey(prevDate, sq));
    if (!saved) return new Set();
    const ids = new Set([
      ...(saved.guardIds  || []).filter(Boolean),
      ...(saved.guardIds2 || []).filter(Boolean),
    ]);
    return ids;
  };
  const vCrew    = vId => sqPersonnel.filter(p => p.vehicleId === vId);

  const addPerson = () => {
    if (!pName.trim()) return;
    const fullName = pRole.trim() ? `${pName.trim()} ${pRole.trim()}` : pName.trim();
    setPersonnel(prev => ({ ...prev, [squad]: [...prev[squad], {
      id: Date.now(), name: fullName, rank: pRank, role: "", vehicleId: null,
    }]}));
    setPName(""); setPRole("");
  };
  const delPerson  = (sq, id) => setPersonnel(prev => ({ ...prev, [sq]: prev[sq].filter(p => p.id !== id) }));

  const renamePerson = (id, newName) => {
    if (!newName.trim()) return;
    setPersonnel(prev => ({ ...prev, [squad]: prev[squad].map(p => p.id===id ? {...p, name:newName.trim()} : p) }));
  };

  const reorderPersonnel = (fromId, toId) => {
    if (fromId === toId) return;
    setPersonnel(prev => {
      const list = [...prev[squad]];
      const fromIdx = list.findIndex(p => p.id===fromId);
      const toIdx   = list.findIndex(p => p.id===toId);
      const [item]  = list.splice(fromIdx, 1);
      list.splice(toIdx, 0, item);
      return { ...prev, [squad]: list };
    });
  };

  const toggleAttendance = (id) =>
    setAttendance(prev => ({ ...prev, [id]: isPresent(id) ? false : true }));

  const isPresent = (id) => attendance[id] !== false;

  const toggleVehicle = (id) =>
    setVehicleStatus(prev => ({ ...prev, [id]: prev[id] === false ? true : false }));

  const isVehicleOn = (id) => vehicleStatus[id] !== false;

  const addVehicle = () => {
    if (!vName.trim()) return;
    const t = VEHICLE_TYPES.find(x => x.key===vType) || VEHICLE_TYPES[0];
    setVehicles(prev => [...prev, { id:Date.now(), name:vName.trim(), type:vType, icon:t.icon, color:t.color }]);
    setVName("");
  };
  const delVehicle = id => setVehicles(prev => prev.filter(v => v.id !== id));

  const assignGuard = (pid, personId) => {
    setGuards(prev => prev.map(g => g.id===pid ? { ...g, guardId: personId ? parseInt(personId) : null } : g));
    setGPicker(null);
  };

  return (
    <div style={{
      minHeight:"100vh",
      background:"#13171f",
      fontFamily:"'Cairo','Segoe UI',sans-serif", direction:"rtl",
      maxWidth:480, margin:"0 auto", paddingBottom:60,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px}
        input,select,button,textarea{font-family:'Cairo',sans-serif!important}
        .tap:active{opacity:.75;transform:scale(.97)}
      `}</style>

      {/* ── HEADER ── */}
      <div style={{
        position:"sticky", top:0, zIndex:100,
        background:"#13171fff", backdropFilter:"blur(16px)",
        borderBottom:"1px solid #e2e6ed",
        padding:"12px 14px 0",
      }}>
        {/* Title */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", marginBottom:10, position:"relative" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:9, color:"#5a6678", letterSpacing:3, marginBottom:2 }}>
              الحماية المدنية — نظام إدارة العمليات
            </div>
            <div style={{ fontSize:16, fontWeight:700, color:"#c5cdd8" }}>
              توزيع المهام للفصيلة
            </div>
          </div>
          {/* Share button */}
          <button
            className="tap"
            onClick={() => {
              // Build share text
              const cycle = Math.floor(vd.getTime() / (86400000 * 3));
              const lines = [];
              lines.push(`🔥 توزيع المهام — ${SQUAD_NAMES[squad]}`);
              lines.push(`📅 ${formatDate(date)}`);
              lines.push('');

              // Guard office
              const lts = sqPersonnel.filter(p => p.rank==="ضابط" && isPresent(p.id));
              const asts = sqPersonnel.filter(p => p.rank==="مساعد" && isPresent(p.id));
              const officerShare = lts.length ? lts[cycle%lts.length] : (asts.length ? asts[cycle%asts.length] : null);
              const sgPool = sqPersonnel.filter(p => (p.rank==="رقيب"||p.rank==="مساعد") && isPresent(p.id));
              const sergeantShare = sgPool.length ? sgPool[(cycle+1)%sgPool.length] : null;
              lines.push(`🛡️ مكتب الحراسة`);
              lines.push(`  👮 ضابط: ${officerShare?.name||'—'}`);
              lines.push(`  🎖️ رقيب: ${sergeantShare?.name||'—'}`);
              lines.push('');

              // Vehicles
              lines.push(`🚗 توزيع المركبات`);
              vehicles.filter(v => isVehicleOn(v.id)).forEach(v => {
                const d = distribution?.[v.id] || {};
                lines.push(`  ${v.icon} ${v.name}:`);
                if (d.driver) lines.push(`    سائق: ${d.driver.name}`);
                if (d.chief)  lines.push(`    رئيس: ${d.chief.name}`);
                (d.crew||[]).forEach((p,i) => lines.push(`    عون${i+1}: ${p.name}`));
              });
              lines.push('');

              // Guard schedule
              lines.push(`⏰ جدول الحراسة`);
              guards.forEach(g => {
                const gp = g.guardId ? getPersonByIdPresent(g.guardId) : null;
                lines.push(`  ${g.time}: ${gp ? gp.name : '—'}`);
              });

              const text = lines.join('\n');
              const waUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
              window.open(waUrl, '_blank');
            }}
            style={{
              position:"absolute", left:0,
              background:"#25D36622", border:"1px solid #25D36655",
              color:"#25D366", borderRadius:8, padding:"4px 8px",
              cursor:"pointer", fontSize:11, fontWeight:700,
              display:"flex", alignItems:"center", gap:4,
            }}
          >
            <span style={{ fontSize:14 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
            </span>
            <span style={{ fontSize:9 }}>واتساب</span>
          </button>
        </div>

        {/* Date Navigator */}
        <div style={{
          background:"#1c2230", borderRadius:10, padding:"8px 12px",
          border:"1px solid #1e2330", marginBottom:8,
          display:"flex", alignItems:"center", gap:8,
        }}>
          <button className="tap" onClick={goNext} style={{
            background:"transparent", border:"none", color:"#5a6678",
            width:28, height:28, borderRadius:6, fontSize:16, cursor:"pointer", flexShrink:0,
          }}>‹</button>

          <div style={{ flex:1, textAlign:"center" }}>
            <div style={{ fontSize:14, fontWeight:600, color:"#c5cdd8", marginBottom:1 }}>
              {isToday && <span style={{ color:sc.light }}>● </span>}
              {formatDate(date)}
            </div>
            <div style={{ color:sc.light, fontSize:11, fontWeight:500 }}>
              {SQUAD_NAMES[squad]}
            </div>
          </div>

          <button className="tap" onClick={goPrev} style={{
            background:"transparent", border:"none", color:"#5a6678",
            width:28, height:28, borderRadius:6, fontSize:16, cursor:"pointer", flexShrink:0,
          }}>›</button>
        </div>

        {/* Action Buttons */}
        <div style={{ display:"flex", gap:6, paddingBottom:10 }}>
          {[
            { k:"settings", i:"⚙️", l:"الإعدادات" },
            { k:"personnel",i:"👥", l:"الأفراد"   },
            { k:"vehicles", i:"🚒", l:"الآليات"   },
          ].map(b => (
            <button key={b.k} className="tap" onClick={() => setModal(b.k)} style={{
              flex:1, padding:"5px 4px", borderRadius:8,
              background: modal===b.k ? sc.bg : "#161b27",
              border:`1px solid ${modal===b.k ? "transparent" : "#2a3347"}`,
              color: modal===b.k ? "#fff" : "#6b7280",
              cursor:"pointer", fontSize:9, fontWeight:600,
              display:"flex", alignItems:"center", justifyContent:"center", gap:5,
              transition:"all .15s",
            }}>
              <span style={{ fontSize:13 }}>{b.i}</span>{b.l}
            </button>
          ))}
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{ padding:"16px 14px" }}>

        {/* Stats Card */}
        {(() => {
          const total   = sqPersonnel.length;
          const present = sqPersonnel.filter(p => isPresent(p.id)).length;
          const absent  = total - present;
          const stats = [
            { label:"الإجمالي", value:total,   color:"#7a8799", icon:"👥" },
            { label:"حاضر",    value:present,  color:"#00B86B", icon:"✓"  },
            { label:"غائب",    value:absent,   color:"#FF4B2B", icon:"✗"  },
          ];
          return (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7, marginBottom:12 }}>
              {stats.map((s,i) => (
                <div key={i} style={{
                  background:"#161b27cc", borderRadius:10, padding:"7px 5px",
                  border:`1px solid ${s.color}33`, textAlign:"center",
                }}>
                  <div style={{ fontSize:13, marginBottom:2 }}>{s.icon}</div>
                  <div style={{ color:s.color, fontSize:16, fontWeight:900, lineHeight:1 }}>{s.value}</div>
                  <div style={{ color:"#5a6678", fontSize:9, marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          );
        })()}

        {/* Guard Office Card */}
        {(() => {
          const cycle = Math.floor(vd.getTime() / (86400000 * 3));

          // ضابط الحراسة: ضابط حاضر → وإلا مساعد حاضر
          const lieutenants  = sqPersonnel.filter(p => p.rank === "ضابط"  && isPresent(p.id));
          const assistantOff = sqPersonnel.filter(p => p.rank === "مساعد" && isPresent(p.id));
          const officer = lieutenants.length
            ? lieutenants[cycle % lieutenants.length]
            : (assistantOff.length ? assistantOff[cycle % assistantOff.length] : null);

          // الرقيب اليومي: رقيب أو مساعد (مساعد يعمل كرقيب)
          const officerRank  = officer ? officer.rank : null;
          const sergeantPool = sqPersonnel.filter(p => (p.rank === "رقيب" || p.rank === "مساعد") && isPresent(p.id));
          const sergeant = sergeantPool.length
            ? sergeantPool[(cycle + 1) % sergeantPool.length]
            : null;

          const RoleCard = ({ icon, label, person, rank }) => (
            <div style={{
              background:"#13171f", borderRadius:8, padding:"6px 10px",
              display:"flex", alignItems:"center", gap:8, border:"1px solid #1a2035",
            }}>
              <span style={{ fontSize:14, flexShrink:0 }}>{icon}</span>
              <div style={{ color:"#5a6678", fontSize:9, flexShrink:0 }}>{label}</div>
              <div style={{ color: person ? "#232b3a" : "#374151", fontSize:12, fontWeight:700, flex:1 }}>
                {person ? person.name : "—"}
              </div>
              {person && (
                <span style={{
                  background:`${RANK_COLORS[person.rank]||"#6b7280"}22`,
                  color: RANK_COLORS[person.rank]||"#6b7280",
                  border:`1px solid ${RANK_COLORS[person.rank]||"#6b7280"}55`,
                  borderRadius:5, padding:"1px 6px", fontSize:9, fontWeight:700, flexShrink:0,
                }}>{person.rank}</span>
              )}
            </div>
          );

          return (
            <div style={{
              background:"#161b27cc", borderRadius:12, padding:"8px 12px",
              border:`1px solid ${sc.bg}44`, borderRight:`3px solid ${sc.bg}`,
              marginBottom:14, boxShadow:"none",
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:7 }}>
                <span style={{ fontSize:14 }}>🛡️</span>
                <span style={{ color:"#e8ecf1", fontSize:12, fontWeight:800 }}>مكتب الحراسة</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <RoleCard icon="👮" label="ضابط" person={officer} rank={officerRank||"ضابط"}/>
                <RoleCard icon="🎖️" label="رقيب" person={sergeant} rank={sergeant?.rank||"رقيب"}/>
              </div>
            </div>
          );
        })()}

        {/* Vehicles — Smart Distribution */}
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
          <div style={{ width:4, height:20, background:sc.bg, borderRadius:2 }}/>
          <span style={{ color:"#e8ecf1", fontSize:15, fontWeight:700 }}>توزيع المهام</span>
        </div>

        <div style={{ marginBottom:28 }}>
          {VEHICLE_TYPES.map(vt => {
            const group = vehicles.filter(v => v.type === vt.key);
            if (group.length === 0) return null;
            return (
              <div key={vt.key} style={{ marginBottom:18 }}>
                {/* Category label */}
                <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:8 }}>
                  <span style={{ fontSize:14 }}>{vt.icon}</span>
                  <span style={{ color:vt.color, fontSize:11, fontWeight:800, background:`${vt.color}18`, border:`1px solid ${vt.color}40`, borderRadius:6, padding:"2px 9px" }}>{vt.label}</span>
                  <div style={{ flex:1, height:1, background:"#1a2030" }}/>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  {group.map(v => {
                    const d = distribution?.[v.id] || {};
                    const cfg = vehicleCounts[v.id] || {};

                    const MemberRow = ({ person, role, roleColor }) => (
                      <div style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 6px", background:"#13171f", borderRadius:7, border:"1px solid #1a2035" }}>
                        <div style={{ width:5, height:5, borderRadius:"50%", background: roleColor || "#6b7280", flexShrink:0 }}/>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color: person?"#232b3a":"#374151", fontSize:10, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                            {person ? person.name : "—"}
                          </div>
                          {person && <div style={{ color: RANK_COLORS[person.rank]||"#6b7280", fontSize:8, fontWeight:700 }}>{person.rank}</div>}
                        </div>
                        <div style={{ color:"#5a6678", fontSize:8, fontWeight:600, background:"#1c2230", borderRadius:4, padding:"1px 5px", flexShrink:0 }}>{role}</div>
                      </div>
                    );

                    return (
                      <div key={v.id} style={{
                        background:"#1c2230", borderRadius:14,
                        border:`1px solid ${isVehicleOn(v.id) ? "#2a3347" : "#ff4b2b33"}`,
                        borderTop:`3px solid ${isVehicleOn(v.id) ? v.color : "#374151"}`,
                        overflow:"hidden", opacity: isVehicleOn(v.id) ? 1 : 0.6,
                        transition:"all .2s",
                      }}>
                        {/* Vehicle header */}
                        <div style={{ padding:"8px 10px 6px", display:"flex", alignItems:"center", gap:6 }}>
                          <span style={{ fontSize:18 }}>{v.icon}</span>

                            <input
                              autoFocus
                              value={editVehicleName}
                              onChange={e => setEditVehicleName(e.target.value)}

                                if (editVehicleName.trim()) setVehicles(prev => prev.map(x => x.id===v.id ? {...x,name:editVehicleName.trim()} : x));
                                setEditVehicleId(null);
                              }}
                              onKeyDown={e => {
                                if(e.key==="Enter"){ if(editVehicleName.trim()) setVehicles(prev=>prev.map(x=>x.id===v.id?{...x,name:editVehicleName.trim()}:x)); setEditVehicleId(null); }
                                if(e.key==="Escape") setEditVehicleId(null);
                              }}
                              style={{ flex:1, background:"transparent", border:"none", borderBottom:`1px solid ${sc.bg}`, color:"#e8ecf1", fontSize:11, fontWeight:800, outline:"none", fontFamily:"'Cairo',sans-serif" }}
                            />
                          ) : (
                            <span
                              onClick={() => { setEditVehicleId(v.id); setEditVehicleName(v.name); }}
                              style={{ color: isVehicleOn(v.id) ? "#232b3a" : "#6b7280", fontSize:11, fontWeight:800, flex:1, cursor:"text" }}
                            >{v.name}</span>

                          {/* Driver warning */}
                          {isVehicleOn(v.id) && !d.driver && (
                            <span style={{ fontSize:10, color:"#FF4B2B" }} title="لا يوجد سائق">⚠️</span>

                            onClick={() => toggleVehicle(v.id)}
                            style={{
                              background: isVehicleOn(v.id) ? "#00B86B22" : "#ff4b2b22",
                              border:`1px solid ${isVehicleOn(v.id) ? "#00B86B55" : "#ff4b2b55"}`,
                              color: isVehicleOn(v.id) ? "#00D97E" : "#ff6b4a",
                              borderRadius:6, padding:"2px 7px",
                              cursor:"pointer", fontSize:9, fontWeight:800, flexShrink:0,
                            }}
                          >
                            {isVehicleOn(v.id) ? "ON" : "OFF"}
                          </button>
                        </div>

                        <div style={{ padding:"0 8px 8px", display:"flex", flexDirection:"column", gap:4 }}>
                          {isVehicleOn(v.id) ? (<>
                          <MemberRow person={d.driver} role="سائق" roleColor="#F59E0B"/>
                          {v.type !== "VL" && (
                            <MemberRow
                              person={d.chief}
                              role={
                                v.type==="إسعاف" ? "رئيس" :
                                d.chief && d.chief.rank==="ضابط" ? "رئيس+قائد" :
                                d.chief && d.chief.rank==="مساعد" ? "رئيس+رقيب" :
                                "رئيس"
                              }
                              roleColor={
                                d.chief && (d.chief.rank==="ضابط"||d.chief.rank==="مساعد") ? "#F59E0B" : "#8B5CF6"
                              }
                            />
                          )}
                          {(() => {
                            if (v.type !== "تدخل") {
                              return (d.crew||[]).map((p,i) => (
                                <MemberRow key={i} person={p} role="عون" roleColor="#6b7280"/>
                              ));
                            }
                            const nCorp = (vehicleCounts[v.id]||{}).corporals ?? 1;
                            const nAg   = (vehicleCounts[v.id]||{}).agents    ?? 1;
                            const crew  = d.crew || [];
                            const rows  = [];
                            // Corporal slots
                            for (let i=0; i<nCorp; i++) {
                              rows.push(<MemberRow key={`c${i}`} person={crew[i]||null} role="عريف" roleColor="#8B5CF6"/>);
                            }
                            // Agent slots — show empty if missing
                            for (let i=0; i<nAg; i++) {
                              const p = crew[nCorp+i] || null;
                              rows.push(
                                <MemberRow key={`a${i}`} person={p} role="عون" roleColor="#6b7280"/>
                              );
                            }
                            return rows;
                          })()}

                          {/* Counter for ambulance agents */}
                          {v.type === "إسعاف" && (
                            <div style={{
                              display:"flex", alignItems:"center", gap:6,
                              marginTop:4, padding:"5px 6px",
                              background:"#13171f", borderRadius:7,
                              border:"1px dashed #2d3550",
                            }}>
                              <span style={{ color:"#5a6678", fontSize:9, flex:1 }}>أعوان</span>
                              <button
                                onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,agents:Math.max(0,(cfg.agents??1)-1)}}))}
                                style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                              >−</button>
                              <span style={{ color:"#e8ecf1",fontWeight:800,fontSize:12,minWidth:14,textAlign:"center" }}>
                                {cfg.agents ?? 1}
                              </span>
                              <button
                                onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,agents:Math.min(3,(cfg.agents??1)+1)}}))}
                                style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                              >+</button>
                            </div>
                          )}

                          {/* Counters for truck corporals and agents */}
                          {v.type === "تدخل" && (
                            <div style={{ display:"flex", flexDirection:"column", gap:4, marginTop:4 }}>
                              <div style={{
                                display:"flex", alignItems:"center", gap:6,
                                padding:"5px 6px", background:"#13171f", borderRadius:7,
                                border:"1px dashed #2d3550",
                              }}>
                                <span style={{ color: RANK_COLORS["عريف"], fontSize:9, flex:1 }}>عرفاء</span>
                                <button
                                  onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,corporals:Math.max(0,(cfg.corporals??1)-1)}}))}
                                  style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                                >−</button>
                                <span style={{ color:"#e8ecf1",fontWeight:800,fontSize:12,minWidth:14,textAlign:"center" }}>
                                  {cfg.corporals ?? 1}
                                </span>
                                <button
                                  onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,corporals:Math.min(4,(cfg.corporals??1)+1)}}))}
                                  style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                                >+</button>
                              </div>
                              <div style={{
                                display:"flex", alignItems:"center", gap:6,
                                padding:"5px 6px", background:"#13171f", borderRadius:7,
                                border:"1px dashed #2d3550",
                              }}>
                                <span style={{ color: RANK_COLORS["عون"], fontSize:9, flex:1 }}>أعوان</span>
                                <button
                                  onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,agents:Math.max(0,(cfg.agents??1)-1)}}))}
                                  style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                                >−</button>
                                <span style={{ color:"#e8ecf1",fontWeight:800,fontSize:12,minWidth:14,textAlign:"center" }}>
                                  {cfg.agents ?? 1}
                                </span>
                                <button
                                  onClick={() => setVehicleCounts(p => ({...p,[v.id]:{...cfg,agents:Math.min(4,(cfg.agents??1)+1)}}))}
                                  style={{ background:"#1a2030",border:"none",color:"#7a8799",width:20,height:20,borderRadius:5,cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0 }}
                                >+</button>
                              </div>
                            </div>
                          )}
                          </>) : (
                            <div style={{ padding:"6px 4px", textAlign:"center", color:"#ff6b4a", fontSize:10, fontWeight:700 }}>
                              خارج الخدمة
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Guard Schedule */}
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
          <div style={{ width:4, height:20, background:sc.bg, borderRadius:2 }}/>
          <span style={{ color:"#e8ecf1", fontSize:15, fontWeight:700 }}>جدول فترات الحراسة</span>
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {(() => {
            const prevGuardIds = getPrevGuardIds();
            return guards.map((g, i) => {
            const gPerson  = g.guardId  ? getPersonByIdPresent(g.guardId)  : null;
            const gPerson2 = g.guardId2 ? getPersonByIdPresent(g.guardId2) : null;
            const gName    = gPerson  ? gPerson.name  : null;
            const gName2   = gPerson2 ? gPerson2.name : null;
            const nameColor  = gPerson  ? (RANK_COLORS[gPerson.rank]  || sc.light) : "#5a6678";
            const nameColor2 = gPerson2 ? (RANK_COLORS[gPerson2.rank] || sc.light) : "#5a6678";
            const repeated   = gPerson && prevGuardIds.has(gPerson.id);
            const count      = g.count ?? 1;

            const toggleCount = () => {
              const newCount = count === 1 ? 2 : 1;
              setGuards(prev => prev.map(x => x.id===g.id
                ? { ...x, count: newCount, guardId2: newCount===1 ? null : x.guardId2 }
                : x
              ));
            };

            const NameBadge = ({ person, name, color, rep }) => (
              <div style={{
                background: name ? `${color}15` : "#1e2535",
                border:`1px solid ${name ? color+"50" : "#2a3347"}`,
                borderRadius:7, padding:"5px 8px", flex:1, textAlign:"center",
              }}>
                {name ? (
                  <div>
                    <div style={{ color, fontSize:10, fontWeight:700 }}>{name}</div>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:3 }}>
                      {person && <span style={{ color:color+"99", fontSize:8 }}>{person.rank}</span>}
                      {rep && <span style={{ color:"#F59E0B", fontSize:8 }}>↺</span>}
                    </div>
                  </div>
                ) : (
                  <div style={{ color:"#5a6678", fontSize:10 }}>—</div>
                )}
              </div>
            );

            return (
              <div key={g.id} style={{
                background:"#1c2230", borderRadius:12, border:"1px solid #1a2035",
                borderRight:`4px solid ${i%2===0 ? sc.bg : sc.bg+"77"}`,
                padding:"10px 12px",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  {/* Period number */}
                  <div style={{
                    width:26, height:26, borderRadius:"50%", flexShrink:0,
                    background:`${sc.bg}16`, border:`1px solid ${sc.bg}38`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:10, fontWeight:800, color:sc.light,
                  }}>{i+1}</div>

                  {/* Time */}
                  <div style={{ minWidth:90 }}>
                    <div style={{ color:"#5a6678", fontSize:9, marginBottom:1 }}>{g.period}</div>
                    <div style={{ color:"#e8ecf1", fontSize:12, fontWeight:700 }}>{g.time}</div>
                  </div>

                  {/* Count toggle */}
                  <button onClick={toggleCount} style={{
                    background: count===2 ? `${sc.bg}22` : "#1e2535",
                    border:`1px solid ${count===2 ? sc.bg+"55" : "#2a3347"}`,
                    color: count===2 ? sc.light : "#5a6678",
                    borderRadius:6, padding:"3px 7px", cursor:"pointer",
                    fontSize:10, fontWeight:700, flexShrink:0,
                  }}>
                    {count===1 ? "حارس" : "حارسين"}
                  </button>

                  {/* Guard name(s) */}
                  <div style={{ display:"flex", gap:5, flex:1 }}>
                    <NameBadge person={gPerson} name={gName} color={nameColor} rep={repeated}/>
                    {count === 2 && (
                      <NameBadge person={gPerson2} name={gName2} color={nameColor2} rep={false}/>
                    )}
                  </div>
                </div>
              </div>
            );
          });})()}
        </div>

        {/* Shift Note */}
        <div style={{ marginTop:16, marginBottom:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7 }}>
            <div style={{ width:4, height:16, background:"#F59E0B", borderRadius:2 }}/>
            <span style={{ color:"#e8ecf1", fontSize:13, fontWeight:700 }}>ملاحظات الوردية</span>
          </div>
          <textarea
            value={shiftNote}
            onChange={e => setShiftNote(e.target.value)}
            placeholder="أضف ملاحظات للوردية..."
            rows={2}
            style={{
              width:"100%", background:"#161b27cc", border:`1px solid #2d3550`,
              color:"#e8ecf1", borderRadius:10, padding:"8px 12px", fontSize:12,
              direction:"rtl", outline:"none", fontFamily:"'Cairo',sans-serif",
              resize:"none", boxSizing:"border-box",
            }}
          />
        </div>

        {/* Unassigned Personnel */}
        {(() => {
          // collect all IDs assigned in vehicles
          const assignedIds = new Set();
          if (distribution) {
            Object.values(distribution).forEach(d => {
              if (d.driver) assignedIds.add(d.driver.id);
              if (d.chief)  assignedIds.add(d.chief.id);
              (d.crew||[]).forEach(p => assignedIds.add(p.id));
            });
          }
          const unassigned = sqPersonnel.filter(p => isPresent(p.id) && !assignedIds.has(p.id));
          if (unassigned.length === 0) return null;
          return (
            <div style={{ marginTop:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ width:4, height:20, background:"#6b7280", borderRadius:2 }}/>
                <span style={{ color:"#7a8799", fontSize:14, fontWeight:700 }}>غير معيَّنين</span>
                <span style={{ background:"#1c2230", color:"#5a6678", fontSize:10, padding:"2px 10px", borderRadius:20 }}>
                  {unassigned.length} فرد
                </span>
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                {unassigned.map(p => (
                  <div key={p.id} style={{
                    background:"#1c2230", borderRadius:10,
                    border:`1px solid ${RANK_COLORS[p.rank]||"#2a3347"}33`,
                    padding:"7px 11px",
                    display:"flex", alignItems:"center", gap:7,
                  }}>
                    <div style={{
                      width:7, height:7, borderRadius:"50%", flexShrink:0,
                      background: RANK_COLORS[p.rank]||"#6b7280",
                    }}/>
                    <div>
                      <div style={{ color:"#c5cdd8", fontSize:11, fontWeight:700 }}>{p.name}</div>
                      <div style={{ color: RANK_COLORS[p.rank]||"#6b7280", fontSize:9, fontWeight:700 }}>{p.rank}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>

      {/* ── GUARD PICKER ── */}
      {gPicker !== null && (
        <Sheet title={`تعيين حارس — ${guards.find(g => g.id===gPicker)?.period}`} onClose={() => setGPicker(null)}>
          <button onClick={() => assignGuard(gPicker, null)} style={{
            width:"100%", padding:10, background:"#1a2030",
            border:"1px solid #2d3550", color:"#ef4444", borderRadius:10,
            cursor:"pointer", marginBottom:12, fontSize:13, fontWeight:700,
          }}>✕ إزالة التعيين</button>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {sqPersonnel.map(p => {
              const sel = guards.find(g => g.id===gPicker)?.guardId === p.id;
              return (
                <button key={p.id} onClick={() => assignGuard(gPicker, p.id)} style={{
                  background: sel ? `linear-gradient(135deg,${sc.bg},${sc.light})` : "#1e2535",
                  border: sel ? "none" : "1px solid #1a2035",
                  borderRadius:10, padding:"10px 13px",
                  display:"flex", alignItems:"center", gap:10,
                  cursor:"pointer", color:"#e8ecf1", textAlign:"right", width:"100%",
                }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700 }}>{p.name}</div>
                    <div style={{ fontSize:10, color: sel ? "#ffffff99" : (RANK_COLORS[p.rank]||"#9ca3af") }}>{p.rank}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </Sheet>
      )}

      {/* ── PERSONNEL ── */}
      {modal === "personnel" && (
        <Sheet title={`أفراد ${SQUAD_NAMES[squad]}`} onClose={() => { setModal(null); setShowAddPerson(false); setEditingPerson(null); setConfirmDelete(null); }}>
          <div style={{ maxHeight:420, overflowY:"auto", marginBottom:14 }}>
            {(() => {
              // Group by rank
              const grouped = {};
              RANKS.forEach(r => { grouped[r] = []; });
              sqPersonnel.forEach(p => {
                if (grouped[p.rank]) grouped[p.rank].push(p);
                else grouped["عون"] = [...(grouped["عون"]||[]), p];
              });
              return RANKS.map((rank, ri) => {
                const members = grouped[rank] || [];
                if (members.length === 0) return null;
                return (
                  <div key={rank}>
                    {/* Rank separator */}
                    <div style={{
                      display:"flex", alignItems:"center", gap:8,
                      padding:"10px 0 6px",
                    }}>
                      <span style={{
                        background:`${RANK_COLORS[rank]}22`,
                        color: RANK_COLORS[rank],
                        border:`1px solid ${RANK_COLORS[rank]}55`,
                        borderRadius:6, padding:"2px 10px", fontSize:11, fontWeight:800,
                      }}>{rank}</span>
                      <div style={{ flex:1, height:1, background:"#1a2030" }}/>
                      <span style={{ color:"#5a6678", fontSize:10 }}>
                        {members.filter(p => isPresent(p.id)).length}/{members.length}
                      </span>
                    </div>
                    {/* Members */}
                    <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                      {members.map(p => (
                        <div
                          key={p.id}
                          draggable
                          onDragStart={() => setDragId(p.id)}
                          onDragOver={e => { e.preventDefault(); setDragOverId(p.id); }}
                          onDrop={() => { reorderPersonnel(dragId, p.id); setDragId(null); setDragOverId(null); }}
                          onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                          style={{
                            background: dragOverId===p.id ? `${sc.bg}18` : "#0f1117",
                            borderRadius:10, padding:"8px 10px",
                            display:"flex", alignItems:"center", gap:8,
                            border:`1px solid ${dragOverId===p.id ? sc.bg+"55" : isPresent(p.id) ? "#2a3347" : "#ff4b2b33"}`,
                            cursor:"grab", transition:"background .15s",
                            opacity: dragId===p.id ? 0.4 : isPresent(p.id) ? 1 : 0.5,
                          }}
                        >
                          {/* Drag handle */}
                          <span style={{ color:"#2a3347", fontSize:14, cursor:"grab", flexShrink:0 }}>⠿</span>

                          {/* Name / edit */}
                          <div style={{ flex:1 }}>
                            {editingPerson?.id === p.id ? (
                              <input
                                autoFocus
                                value={editingPerson.name}
                                onChange={e => setEditingPerson({...editingPerson, name:e.target.value})}
                                onBlur={() => { renamePerson(p.id, editingPerson.name); setEditingPerson(null); }}
                                onKeyDown={e => { if(e.key==="Enter"){ renamePerson(p.id, editingPerson.name); setEditingPerson(null); } if(e.key==="Escape") setEditingPerson(null); }}
                                style={{ ...inputSt, padding:"4px 8px", fontSize:12, borderRadius:6 }}
                              />
                            ) : (
                              <div style={{ color: isPresent(p.id) ? "#232b3a" : "#6b7280", fontSize:12, fontWeight:700 }}>
                                {p.name}
                              </div>
                            )}
                          </div>

                          {/* Attendance button */}
                          <button onClick={() => toggleAttendance(p.id)} style={{
                            background: isPresent(p.id) ? "#00B86B22" : "#ff4b2b22",
                            border: `1px solid ${isPresent(p.id) ? "#00B86B55" : "#ff4b2b55"}`,
                            color: isPresent(p.id) ? "#00D97E" : "#ff4b2b",
                            borderRadius:6, padding:"3px 8px", cursor:"pointer",
                            fontSize:10, fontWeight:700, flexShrink:0,
                          }}>
                            {isPresent(p.id) ? "✓ حاضر" : "✗ غائب"}
                          </button>

                          {/* Edit button */}
                          <button onClick={() => setEditingPerson({id:p.id, name:p.name})} style={{
                            background:"#1a2030", border:"1px solid #2d3550", color:"#7a8799",
                            width:26, height:26, borderRadius:6, cursor:"pointer", fontSize:12, flexShrink:0,
                          }}>✎</button>

                          {/* Delete button */}
                          <button onClick={() => setConfirmDelete(p.id)} style={{
                            background:"#ff4b2b15", border:"1px solid #ff4b2b38", color:"#ff4b2b",
                            width:26, height:26, borderRadius:6, cursor:"pointer", fontSize:14, flexShrink:0,
                          }}>−</button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              });
            })()}
          </div>

          {/* + Button */}
          <button className="tap" onClick={() => setShowAddPerson(true)} style={{
            width:"100%", padding:"12px", border:`2px dashed ${sc.bg}60`,
            background:`${sc.bg}10`, color:sc.light, borderRadius:12,
            cursor:"pointer", fontSize:15, fontWeight:700, display:"flex",
            alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <span style={{ fontSize:22, lineHeight:1 }}>+</span> إضافة فرد
          </button>
        </Sheet>
      )}

      {/* ── CONFIRM DELETE ── */}
      {confirmDelete !== null && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:400,
          display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(8px)", padding:"0 20px",
        }} onClick={() => setConfirmDelete(null)}>
          <div style={{
            background:"#1c2230", borderRadius:20, padding:"24px 20px",
            width:"100%", maxWidth:320, direction:"rtl",
            boxShadow:"0 20px 60px #000c", textAlign:"center",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:36, marginBottom:12 }}>🗑️</div>
            <div style={{ color:"#e8ecf1", fontSize:15, fontWeight:700, marginBottom:6 }}>حذف الفرد؟</div>
            <div style={{ color:"#5a6678", fontSize:12, marginBottom:20 }}>
              {sqPersonnel.find(p=>p.id===confirmDelete)?.name}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setConfirmDelete(null)} style={{
                flex:1, padding:"11px", border:"1px solid #2d3550",
                background:"#1a2030", color:"#7a8799", borderRadius:10,
                cursor:"pointer", fontWeight:700, fontSize:13,
              }}>إلغاء</button>
              <button onClick={() => { delPerson(squad, confirmDelete); setConfirmDelete(null); }} style={{
                flex:1, padding:"11px", border:"none",
                background:"linear-gradient(135deg,#FF4B2B,#FF6B4A)",
                color:"#fff", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:13,
              }}>✓ حذف</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD PERSON POPUP ── */}
      {showAddPerson && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:300,
          display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(8px)", padding:"0 20px",
        }} onClick={() => setShowAddPerson(false)}>
          <div style={{
            background:"#1c2230", borderRadius:20, padding:"24px 20px",
            width:"100%", maxWidth:360, direction:"rtl",
            boxShadow:"0 20px 60px #000c",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h3 style={{ color:"#e8ecf1", fontSize:16, fontWeight:700, margin:0 }}>إضافة فرد جديد</h3>
              <button onClick={() => setShowAddPerson(false)} style={{
                background:"#1a2030", border:"none", color:"#7a8799",
                width:30, height:30, borderRadius:"50%", cursor:"pointer", fontSize:16,
              }}>×</button>
            </div>
            <input
              placeholder="الاسم الكامل *"
              value={pName}
              onChange={e => setPName(e.target.value)}
              style={inputSt}
              autoFocus
            />
            <select value={pRank} onChange={e => setPRank(e.target.value)} style={{ ...inputSt, marginTop:10 }}>
              {RANKS.map(r => <option key={r}>{r}</option>)}
            </select>
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              <button onClick={() => setShowAddPerson(false)} style={{
                flex:1, padding:"11px", border:"1px solid #2d3550",
                background:"#1a2030", color:"#7a8799", borderRadius:10,
                cursor:"pointer", fontWeight:700, fontSize:13,
              }}>إلغاء</button>
              <button onClick={() => { addPerson(); setShowAddPerson(false); }} style={{
                flex:2, padding:"11px", border:"none",
                background:`linear-gradient(135deg,${sc.bg},${sc.light})`,
                color:"#fff", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:13,
              }}>✓ إضافة</button>
            </div>
          </div>
        </div>
      )}

      {/* ── VEHICLES ── */}
      {modal === "vehicles" && (
        <Sheet title="إدارة الآليات" onClose={() => { setModal(null); setShowAddVehicle(false); }}>
          <div style={{ maxHeight:420, overflowY:"auto", marginBottom:14 }}>
            {VEHICLE_TYPES.map(vt => {
              const group = vehicles.filter(v => v.type === vt.key);
              return (
                <div key={vt.key}>
                  {/* Category header */}
                  <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 0 6px" }}>
                    <span style={{ fontSize:18 }}>{vt.icon}</span>
                    <span style={{
                      color: vt.color, fontSize:12, fontWeight:800,
                      background:`${vt.color}18`, border:`1px solid ${vt.color}44`,
                      borderRadius:6, padding:"2px 10px",
                    }}>{vt.label}</span>
                    <div style={{ flex:1, height:1, background:"#1a2030" }}/>
                    <span style={{ color:"#5a6678", fontSize:10 }}>{group.length}</span>
                  </div>
                  {/* Vehicles in group */}
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:4 }}>
                    {group.length === 0 ? (
                      <div style={{ color:"#2a3347", fontSize:11, padding:"6px 10px", textAlign:"center" }}>
                        لا توجد مركبات
                      </div>
                    ) : group.map(v => (
                      <div key={v.id} style={{
                        background:"#13171f", borderRadius:10, padding:"10px 12px",
                        display:"flex", alignItems:"center", gap:10,
                        border:`1px solid ${v.color}30`, borderRight:`4px solid ${v.color}`,
                      }}>
                        <span style={{ fontSize:20 }}>{v.icon}</span>
                        <div style={{ flex:1 }}>
                          <div style={{ color:"#e8ecf1", fontSize:13, fontWeight:700 }}>{v.name}</div>
                          <div style={{ color:"#5a6678", fontSize:10 }}>
                            {sqPersonnel.filter(p => p.vehicleId===v.id).length} فرد مُعيَّن
                          </div>
                        </div>
                        <button onClick={() => setConfirmDeleteVehicle(v.id)} style={{
                          background:"#ff4b2b15", border:"1px solid #ff4b2b38", color:"#ff4b2b",
                          width:27, height:27, borderRadius:7, cursor:"pointer", fontSize:15,
                        }}>−</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          {/* + Add button */}
          <button className="tap" onClick={() => setShowAddVehicle(true)} style={{
            width:"100%", padding:"12px", border:`2px dashed ${sc.bg}60`,
            background:`${sc.bg}10`, color:sc.light, borderRadius:12,
            cursor:"pointer", fontSize:15, fontWeight:700, display:"flex",
            alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <span style={{ fontSize:22, lineHeight:1 }}>+</span> إضافة مركبة
          </button>
        </Sheet>
      )}

      {/* ── ADD VEHICLE POPUP ── */}
      {showAddVehicle && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:300,
          display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(8px)", padding:"0 20px",
        }} onClick={() => setShowAddVehicle(false)}>
          <div style={{
            background:"#1c2230", borderRadius:20, padding:"24px 20px",
            width:"100%", maxWidth:360, direction:"rtl",
            boxShadow:"0 20px 60px #000c",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h3 style={{ color:"#e8ecf1", fontSize:16, fontWeight:700, margin:0 }}>إضافة مركبة</h3>
              <button onClick={() => setShowAddVehicle(false)} style={{
                background:"#1a2030", border:"none", color:"#7a8799",
                width:30, height:30, borderRadius:"50%", cursor:"pointer", fontSize:16,
              }}>×</button>
            </div>

            {/* Type selector */}
            <div style={{ display:"flex", gap:7, marginBottom:12 }}>
              {VEHICLE_TYPES.map(vt => (
                <button key={vt.key} onClick={() => setVType(vt.key)} style={{
                  flex:1, padding:"8px 4px", borderRadius:10, cursor:"pointer",
                  background: vType===vt.key ? `linear-gradient(135deg,${vt.color},${vt.color}cc)` : "#2a3347",
                  border: vType===vt.key ? "none" : `1px solid #2d3550`,
                  color:"#fff", fontWeight:700, fontSize:10,
                  display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                }}>
                  <span style={{ fontSize:18 }}>{vt.icon}</span>
                  <span style={{ fontSize:9, lineHeight:1.2, textAlign:"center" }}>{vt.label}</span>
                </button>
              ))}
            </div>

            <input
              autoFocus
              placeholder={`مثال: ${vType==="VL"?"VL 03":vType==="إسعاف"?"إسعاف 03":"شاحنة صهريج"}`}
              value={vName}
              onChange={e => setVName(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter"){ addVehicle(); setShowAddVehicle(false); }}}
              style={inputSt}
            />
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              <button onClick={() => setShowAddVehicle(false)} style={{
                flex:1, padding:"11px", border:"1px solid #2d3550",
                background:"#1a2030", color:"#7a8799", borderRadius:10,
                cursor:"pointer", fontWeight:700, fontSize:13,
              }}>إلغاء</button>
              <button onClick={() => { addVehicle(); setShowAddVehicle(false); }} style={{
                flex:2, padding:"11px", border:"none",
                background:`linear-gradient(135deg,${sc.bg},${sc.light})`,
                color:"#fff", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:13,
              }}>✓ إضافة</button>
            </div>
          </div>
        </div>
      )}

      {/* ── CONFIRM DELETE VEHICLE ── */}
      {confirmDeleteVehicle !== null && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:400,
          display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(8px)", padding:"0 20px",
        }} onClick={() => setConfirmDeleteVehicle(null)}>
          <div style={{
            background:"#1c2230", borderRadius:20, padding:"24px 20px",
            width:"100%", maxWidth:320, direction:"rtl",
            boxShadow:"0 20px 60px #000c", textAlign:"center",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:36, marginBottom:12 }}>🚗</div>
            <div style={{ color:"#e8ecf1", fontSize:15, fontWeight:700, marginBottom:6 }}>حذف المركبة؟</div>
            <div style={{ color:"#5a6678", fontSize:12, marginBottom:20 }}>
              {vehicles.find(v => v.id===confirmDeleteVehicle)?.name}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setConfirmDeleteVehicle(null)} style={{
                flex:1, padding:"11px", border:"1px solid #2d3550",
                background:"#1a2030", color:"#7a8799", borderRadius:10,
                cursor:"pointer", fontWeight:700, fontSize:13,
              }}>إلغاء</button>
              <button onClick={() => { delVehicle(confirmDeleteVehicle); setConfirmDeleteVehicle(null); }} style={{
                flex:1, padding:"11px", border:"none",
                background:"linear-gradient(135deg,#FF4B2B,#FF6B4A)",
                color:"#fff", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:13,
              }}>✓ حذف</button>
            </div>
          </div>
        </div>
      )}

      {/* ── SETTINGS ── */}
      {modal === "settings" && (
        <Sheet title="الإعدادات" onClose={() => setModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

            {/* Squad Selector */}
            <div style={{ background:"#13171f", borderRadius:14, padding:16, border:"1px solid #1a2035" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <span style={{ fontSize:18 }}>🎯</span>
                <div>
                  <div style={{ color:"#e8ecf1", fontSize:14, fontWeight:700 }}>اختيار الفصيلة</div>
                  <div style={{ color:"#5a6678", fontSize:11 }}>
                    {manualSquad ? "وضع يدوي — الفصيلة محددة يدوياً" : "وضع تلقائي — حسب نظام 24/48"}
                  </div>
                </div>
                {manualSquad && (
                  <button onClick={() => { setManualSquad(null); setDate(new Date()); }} className="tap" style={{
                    marginRight:"auto", background:"#1a2030", border:"1px solid #2d3550",
                    color:"#7a8799", borderRadius:20, padding:"4px 12px",
                    cursor:"pointer", fontSize:10, fontWeight:700,
                  }}>↺ تلقائي</button>
                )}
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {SQUADS.map(sq => {
                  const c = SQUAD_COLORS[sq];
                  const isSelected = manualSquad === sq;
                  return (
                    <button key={sq} className="tap" onClick={() => {
                      setManualSquad(sq);
                      setDate(getNearestDutyDate(sq));
                    }} style={{
                      background: isSelected ? `linear-gradient(135deg,${c.bg}22,${c.bg}10)` : "#0f1117",
                      border: isSelected ? `2px solid ${c.bg}` : "2px solid #1a2035",
                      borderRadius:12, padding:"12px 14px",
                      display:"flex", alignItems:"center", gap:12,
                      cursor:"pointer", textAlign:"right", width:"100%", transition:"all .25s",
                    }}>
                      <Badge sq={sq} size="md"/>
                      <div style={{ flex:1 }}>
                        <div style={{ color:"#e8ecf1", fontWeight:700, fontSize:14 }}>{SQUAD_NAMES[sq]}</div>
                        <div style={{ color:"#5a6678", fontSize:11 }}>{personnel[sq].length} فرد مسجل</div>
                      </div>
                      {isSelected && (
                        <div style={{
                          background:`${c.bg}25`, border:`1px solid ${c.bg}60`,
                          color:c.light, padding:"3px 10px", borderRadius:20, fontSize:10, fontWeight:700,
                        }}>✓ محددة</div>
                      )}
                    </button>
                  );
                })}
              </div>

              <div style={{
                marginTop:12, background:"#1c2230", borderRadius:10,
                padding:"9px 12px", border:"1px solid #1a2035",
                display:"flex", alignItems:"center", gap:8,
              }}>
                <span style={{ fontSize:14 }}>💡</span>
                <div style={{ color:"#5a6678", fontSize:11, lineHeight:1.6 }}>
                  عند تحديد فصيلة، يتنقل التاريخ بـ 3 أيام (يوم مداومتها فقط).
                </div>
              </div>
            </div>

            {/* Shift Info */}
            <div style={{ background:"#13171f", borderRadius:12, padding:14, border:"1px solid #1a2035" }}>
              <div style={{ color:"#5a6678", fontSize:11, marginBottom:8 }}>نظام الدوام</div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontSize:28 }}>⏱</span>
                <div>
                  <div style={{ color:"#e8ecf1", fontSize:13, fontWeight:700 }}>24 ساعة عمل / 48 ساعة راحة</div>
                  <div style={{ color:"#5a6678", fontSize:11 }}>A: 14/03 · B: 15/03 · C: 16/03</div>
                </div>
              </div>
            </div>

          </div>
        </Sheet>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    document.getElementById('loading').style.display='none';
  </script>
</body>
</html>
